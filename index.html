<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Hymn Application</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        input {
            padding: 10px;
            margin-bottom: 20px;
        }
        .hymn {
            margin-bottom: 15px;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Hymn Search Application</h1>
    <input type="text" id="search" placeholder="Search for a hymn..." onkeyup="filterHymns()">
    <div id="hymn-list"></div>
    <script>
        const hymns = [];

        fetch('hymns.json')
            .then(response => response.json())
            .then(data => {
                hymns.push(...data);
                displayHymns(data);
            });

        function displayHymns(hymns) {
            const hymnList = document.getElementById('hymn-list');
            hymnList.innerHTML = '';
            hymns.forEach(hymn => {
                const hymnDiv = document.createElement('div');
                hymnDiv.className = 'hymn';
                hymnDiv.innerHTML = `<h2>${hymn.number}: ${hymn.title}</h2>
                                    <p><strong>Author:</strong> ${hymn.author}<br>
                                    <strong>Composer:</strong> ${hymn.composer}<br>
                                    <strong>Scripture:</strong> ${hymn.scripture.join(', ')}<br>
                                    <strong>Twi:</strong> ${hymn.twi_title}</p>`;
                hymnList.appendChild(hymnDiv);
            });
        }

        function filterHymns() {
            const input = document.getElementById('search').value.toLowerCase();
            const filteredHymns = hymns.filter(hymn => hymn.title.toLowerCase().includes(input) || hymn.twi_title.toLowerCase().includes(input));
            displayHymns(filteredHymns);
        }
    </script>
</body>
</html>
